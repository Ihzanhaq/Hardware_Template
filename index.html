<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0f12" />
    <meta
      name="description"
      content="Forge — pro-grade hardware tools. Power tools, hand tools, fasteners, safety gear, and tool storage built to outlast the job."
    />
    <title>Forge — Hardware & Power Tools</title>

    <!-- Prevent dark-mode flash: apply stored theme before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('forge-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = stored || (prefersDark ? 'dark' : 'light')
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Space+Grotesk:wght@400..700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
